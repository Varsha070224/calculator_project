name: Code Quality Check

on:
  push:
  pull_request:

permissions:
  pull-requests: write
  contents: read

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pycodestyle
        run: |
          pip install pycodestyle

      - name: Run pycodestyle
        run: |
          pycodestyle . > style_report.txt || true
          cat style_report.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s style_report.txt ]; then
            echo '{
              "body": "pycodestyle violations found. Check workflow logs for details."
            }' > comment.json

            curl -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -d @comment.json
          fi

      - name: Check File Length
        run: |
          python scripts/line_check.py

      - name: Check Docstrings
        run: |
          python scripts/docstring_check.py
